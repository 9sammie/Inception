
services:
  mariadb:
    build:
      context: .
      dockerfile: requirements/mariadb/Dockerfile
    container_name: mariadb
    networks:
      - inception_network
    # volumes:
    #   - mariadb_data:/var/lib/mysql
    env_file:
      - .env
    restart: always

  wordpress:
    build:
      context: .
      dockerfile: requirements/wordpress/Dockerfile
    container_name: wordpress
    depends_on:
      - mariadb
    networks:
      - inception_network
    # volumes:
    #   - .env
    restart: always

networks:
  inception_network:
    driver: bridge

